# examples:
#   periodic_cleanup:
#     class: CleanSoftDeletedRecordsJob
#     queue: background
#     args: [ 1000, { batch_size: 500 } ]
#     schedule: every hour
#   periodic_cleanup_with_command:
#     command: "SoftDeletedRecord.due.delete_all"
#     priority: 2
#     schedule: at 5am every day

production:
  clear_solid_queue_finished_jobs:
    command: "SolidQueue::Job.clear_finished_in_batches(sleep_between_batches: 0.3)"
    schedule: every hour at minute 12

  # Incinerate trash past its purge deadline (30 days; 2 years for
  # ever-published content — legal retention).
  purge_trash:
    class: Record::PurgeTrashJob
    schedule: at 4am every day

  # Weekly newsletter list hygiene: nudge cold subscribers, then sunset the
  # unresponsive. Inert until Subscriber.sunset_enabled? (ADR 0014).
  sunset_subscribers:
    class: SubscriberSunsetJob
    schedule: at 8am every Monday

  # Daily drip heartbeat: send each active stream's next due Drop. Day-0 Drops
  # fire immediately on confirmation; this catches every later Drop by its day.
  drip_tick:
    class: DripTickJob
    schedule: at 7am every day

  # Daily contact-form digest to the domain admins ("X new messages"), counting
  # missives confirmed in the last 24h. Skips the send when there's nothing new.
  missive_digest:
    class: MissiveDigestJob
    schedule: at 8am every day

  # Daily contact-form purge: drop confirmed missives past 60 days and
  # never-confirmed submissions past their 7-day TTL.
  missive_purge:
    class: MissivePurgeJob
    schedule: at 4am every day
