/* Self-contained: these pages are served when the app/asset pipeline may
   be down, so no external assets. Colors mirror the Merovex Press palette
   (syō-ro teal + mountain-mist); the serif falls back to Georgia. */
:root {
  --bg:     oklch(98.407% 0.00168 145.562);
  --text:   oklch(21.739% 0.00192 106.558);
  --muted:  oklch(37.460% 0.00335 106.560);
  --accent: oklch(47.902% 0.04013 175.196);
}
@media (prefers-color-scheme: dark) {

    --bg:     oklch(14.914% 0.00210 106.652);

    --muted:  oklch(65.604% 0.00292 106.480);
    --accent: oklch(74.285% 0.03827 172.481);
  }
}
*, *::before, *::after { box-sizing: border-box; }
* { margin: 0; }
html { font-size: 16px; }
body {
  min-height: 100dvh;
  display: grid;
  place-items: center;
  padding: 2rem 1.5rem;
  background: var(--bg);
  color: var(--text);
  font-family: "Source Sans 3", system-ui, -apple-system, "Segoe UI", sans-serif;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
  text-align: center;
}
.mark { display: block; width: 48px; height: 48px; color: var(--accent); margin-inline: auto; }
.mark svg { width: 100%; height: 100%; }
.code {
  margin-top: 1.5rem;
  font-family: "Source Serif 4", Georgia, "Times New Roman", serif;
  font-weight: 700;
  font-size: clamp(3.5rem, 12vw, 6rem);
  line-height: 1;
  color: var(--accent);
}
.title {
  margin-top: 0.5rem;
  font-family: "Source Serif 4", Georgia, "Times New Roman", serif;
  font-weight: 700;
  font-size: clamp(1.4rem, 4vw, 2rem);
  color: var(--text);
}
.text { margin-top: 0.75rem; color: var(--muted); max-width: 34rem; }
.home {
  display: inline-flex;
  align-items: center;
  margin-top: 2rem;
  padding: 0.6em 1.4em;
  font-size: 0.875rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  text-decoration: none;
  color: var(--accent);
  border: 1px solid var(--accent);
  border-radius: 0.25rem;
}
.home:hover { background: var(--accent); color: var(--bg); }
